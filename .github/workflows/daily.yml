name: Daily Tech Hotspot

on:
  schedule:
    # Run at 06:00 Beijing time (UTC 22:00 previous day) every day
    - cron: '0 22 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run collector
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_FROM_EMAIL: ${{ secrets.NEWSLETTER_FROM_EMAIL }}
          BLOG_BASE_URL: ${{ vars.BLOG_BASE_URL }}
        run: |
          python main.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit, push to main, and tag
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          TAG="daily/${TODAY}"

          # Configure git
          git config user.name "Social Hotspot Bot"
          git config user.email "bot@social-hotspot-daily"

          # Stage generated content
          git add docs/index.html docs/feed.json docs/archive/ docs/subscribe.html docs/verify.html docs/unsubscribe.html docs/${TODAY}/

          # Commit if there are changes
          if git diff --cached --quiet; then
            echo "No content changes to commit"
            exit 0
          fi

          git commit -m "daily update: ${TODAY}"

          # Pull latest main to avoid push rejection
          git pull origin main --rebase

          # Push to main
          git push origin main

          # Delete old tag if exists, then create new tag
          git push origin --delete "$TAG" 2>/dev/null || true
          git tag -a "$TAG" -m "Daily tech news: ${TODAY}"
          git push origin "$TAG"
