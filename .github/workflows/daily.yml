name: Daily Tech Hotspot

on:
  schedule:
    # Run at 06:00 Beijing time (UTC 22:00 previous day) every day
    - cron: '0 22 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run collector
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_FROM_EMAIL: ${{ secrets.NEWSLETTER_FROM_EMAIL }}
          BLOG_BASE_URL: ${{ vars.BLOG_BASE_URL }}
        run: |
          python main.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create PR, merge, tag, and clean up
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          BRANCH="daily/${TODAY}"
          TAG="daily/${TODAY}"

          # Configure git
          git config user.name "Social Hotspot Bot"
          git config user.email "bot@social-hotspot-daily"

          # Try to delete existing remote branch first (in case of retry)
          git push origin --delete "$BRANCH" 2>/dev/null || true

          # Create and switch to feature branch
          git checkout -b "$BRANCH"

          # Stage generated content (including date-specific directories)
          git add docs/index.html docs/feed.json docs/archive/ docs/subscribe.html docs/verify.html docs/unsubscribe.html docs/${TODAY}/

          # Commit if there are changes
          if git diff --cached --quiet; then
            echo "No content changes to commit"
            exit 0
          fi

          git commit -m "daily update: ${TODAY}"

          # Push branch
          git push origin "$BRANCH"

          # Create PR
          gh pr create \
            --title "📰 Daily Tech Hotspot — ${TODAY}" \
            --body "Automated daily news aggregation for **${TODAY}**.

          This PR includes the latest tech news collected and summarized by AI.

          - Content generated by: DeepSeek V4 Flash
          - Sources: HackerNews, RSS, and other enabled platforms" \
            --base main \
            --head "$BRANCH"

          # Merge the PR immediately
          gh pr merge "$BRANCH" --merge --subject "Daily update ${TODAY}"

          # Switch back to main and pull latest
          git checkout main
          git pull origin main

          # Delete the old tag if it exists (from a previous run)
          git push origin --delete "$TAG" 2>/dev/null || true

          # Create a tag
          git tag -a "$TAG" -m "Daily tech news: ${TODAY}"
          git push origin "$TAG"

          # Delete the remote branch
          git push origin --delete "$BRANCH"
