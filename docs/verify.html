<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Subscription — Tech Hotspot Daily</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --border: #252535;
            --text: #e2e2f0;
            --text-secondary: #8b8ba7;
            --accent: #6366f1;
            --success: #10b981;
            --error: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 32px;
            text-align: center;
        }
        .status-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
        p { color: var(--text-secondary); font-size: 15px; line-height: 1.6; }
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-icon" id="icon">⏳</div>
        <h1 id="title">Verifying...</h1>
        <p id="message">Please wait while we verify your subscription.</p>
        <a href="index.html" class="back-link">← Back to Daily Report</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const email = params.get('email');

        const icon = document.getElementById('icon');
        const title = document.getElementById('title');
        const message = document.getElementById('message');

        if (token) {
            // In production, this would verify the token with the backend
            // For static demo, show success message
            setTimeout(() => {
                icon.textContent = '✅';
                title.textContent = 'Subscription Verified!';
                message.innerHTML = 'Thank you! You will now receive daily tech news in your inbox.<br><br>First email coming tomorrow morning.';
            }, 1500);
        } else if (email) {
            icon.textContent = '✅';
            title.textContent = 'Unsubscribed';
            message.textContent = 'You have been successfully unsubscribed. Sorry to see you go!';
        } else {
            icon.textContent = '❌';
            title.textContent = 'Invalid Link';
            message.textContent = 'This verification link is invalid or has expired.';
        }
    </script>
</body>
</html>
